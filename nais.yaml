image: "docker.adeo.no:5000/sak"
replicas:
  min: 8
  max: 12
  cpuThresholdPercentage: 50
port: 8080
healthcheck:
  liveness:
    path: internal/alive
    initialDelay: 30
  readiness:
    path: internal/ready
    initialDelay: 60
prometheus:
  enabled: true
  path: internal/metrics
resources:
  limits:
    cpu: 4000m
fasitResources:
  used:
    - alias: SAKDS
      resourceType: datasource
    - alias: SAK_GR_DS
      resourceType: datasource
    - alias: abac.pdp.endpoint
      resourceType: restservice
      propertyMap:
         url: ABAC_PDP_ENDPOINT
    - alias: ISSO-JWKS
      resourceType: baseUrl
      propertyMap:
         url: OPENIDCONNECT_ISSO_JWKS
    - alias: ISSO-ISSUER
      resourceType: baseurl
      propertyMap:
         url: OPENIDCONNECT_ISSO_ISSUER
    - alias: LDAP
      resourceType: ldap
      propertyMap:
         url: LDAP_URL
         username: LDAP_USERNAME
         password: LDAP_PASSWORD
         serviceuser_base_dn: LDAP_SERVICEUSER_BASEDN
    - alias: srvsak
      resourceType: credential

  exposed:
    - alias: sak.saker
      resourceType: restservice
      path: /api/v1/saker
    - alias: sak.alive
      resourceType: restservice
      path: /internal/alive

spring.main.banner-mode=off

# server
server.shutdown=graceful

# datasource
spring.datasource.driver-class-name=oracle.jdbc.pool.OracleDataSource
spring.transaction.default-timeout=300s
spring.flyway.enabled=false
spring.jpa.open-in-view=false

spring.mvc.pathmatch.matching-strategy=path_pattern_parser
spring.jersey.servlet.load-on-startup=1

# actuators
management.endpoints.web.exposure.include=prometheus,health
# actuator - health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.health.diskspace.enabled=false
management.endpoint.health.group.liveness.include=db

management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

#security
no.nav.security.jwt.issuer.entra.accepted-audience=${AZURE_APP_CLIENT_ID}
no.nav.security.jwt.issuer.entra.discovery-url=${AZURE_APP_WELL_KNOWN_URL}

spring.main.banner-mode=off

# server
server.shutdown=graceful

# datasource
spring.datasource.hikari.schema=JOARK
spring.datasource.driver-class-name=oracle.jdbc.pool.OracleDataSource
spring.transaction.default-timeout=300s
spring.datasource.hikari.connection-init-sql=select 1 from dual
spring.flyway.enabled=false

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.jersey.servlet.load-on-startup=1

# actuators
management.endpoints.web.exposure.include=prometheus,health
# actuator - health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.health.diskspace.enabled=false
management.endpoint.health.group.liveness.include=db

management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

#security
no.nav.security.jwt.issuers=azuread
no.nav.security.jwt.issuer.azuread.accepted-audience=${AZURE_APP_CLIENT_ID}
no.nav.security.jwt.issuer.azuread.discovery-url=${AZURE_APP_WELL_KNOWN_URL}
no.nav.security.jwt.issuer.azuread.proxy-url=${HTTP_PROXY}

abac.pdp.read_timeout=5000